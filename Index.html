<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Dash</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #gameCanvas { display: block; background: linear-gradient(#87CEEB, #E0F6FF); }
        #ui { position: absolute; top: 10px; left: 10px; font-size: 24px; font-weight: bold; color: #2d5a27; }
    </style>
</head>
<body>
    <div id="ui">Obstacles: <span id="score">0</span>/10</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = true;
        let isDancing = false;
        let frame = 0;

        const dragon = {
            x: 100, y: 0, w: 60, h: 60, dy: 0, 
            jumpForce: -15, gravity: 0.8, grounded: false,
            danceY: 0
        };

        const obstacles = [];
        const groundY = canvas.height - 100;
        dragon.y = groundY - dragon.h;

        function spawnObstacle() {
            if (score >= 10 || isDancing) return;
            const type = Math.random() > 0.5 ? 'log' : 'puddle';
            obstacles.push({ x: canvas.width, type: type, w: 50, h: 30, passed: false });
        }

        function drawDragon() {
            ctx.save();
            if (isDancing) {
                ctx.translate(0, Math.sin(frame * 0.2) * 20);
                ctx.rotate(Math.sin(frame * 0.1) * 0.2);
            }
            
            // Body
            ctx.fillStyle = '#4CAF50';
            ctx.fillRect(dragon.x, dragon.y, dragon.w, dragon.h);
            
            // Big Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(dragon.x + 45, dragon.y + 15, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(dragon.x + 48, dragon.y + 15, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Wings/Spikes
            ctx.fillStyle = '#2E7D32';
            ctx.beginPath();
            ctx.moveTo(dragon.x, dragon.y);
            ctx.lineTo(dragon.x - 20, dragon.y + 20);
            ctx.lineTo(dragon.x, dragon.y + 40);
            ctx.fill();
            ctx.restore();
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#5d4037';
            ctx.fillRect(0, groundY, canvas.width, 100);

            if (!isDancing) {
                // Physics
                dragon.dy += dragon.gravity;
                dragon.y += dragon.dy;

                if (dragon.y + dragon.h > groundY) {
                    dragon.y = groundY - dragon.h;
                    dragon.dy = 0;
                    dragon.grounded = true;
                }

                // Obstacles
                obstacles.forEach((obs, index) => {
                    obs.x -= 8;
                    ctx.fillStyle = obs.type === 'log' ? '#8d6e63' : '#2196F3';
                    ctx.fillRect(obs.x, groundY - obs.h, obs.w, obs.h);

                    // Score tracking
                    if (!obs.passed && obs.x + obs.w < dragon.x) {
                        obs.passed = true;
                        score++;
                        scoreEl.innerText = score;
                        if (score >= 10) isDancing = true;
                    }

                    // Collision (simplified)
                    if (dragon.x < obs.x + obs.w && dragon.x + dragon.w > obs.x &&
                        dragon.y + dragon.h > groundY - obs.h) {
                        score = 0; // Reset on hit
                        scoreEl.innerText = score;
                    }
                });

                if (frame % 80 === 0) spawnObstacle();
            } else {
                ctx.fillStyle = '#2d5a27';
                ctx.font = '40px Arial';
                ctx.fillText("VICTORY DANCE!", canvas.width/2 - 150, canvas.height/2);
            }

            drawDragon();
            frame++;
            requestAnimationFrame(update);
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && dragon.grounded && !isDancing) {
                dragon.dy = dragon.jumpForce;
                dragon.grounded = false;
            }
        });

        update();
    </script>
</body>
</html>
