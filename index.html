<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Dash</title>
    <style>
        * { touch-action: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; }
        #ui { position: absolute; top: 20px; left: 20px; font-family: sans-serif; font-size: 20px; font-weight: bold; color: #1b4332; z-index: 10; }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="ui">Obstacles: <span id="score">0</span>/10</div>
    <canvas id="gameCanvas"></canvas>   
    <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    let score = 0;
    let isDancing = false;
    let frame = 0;
    let groundY; // Define globally

    const dragon = {
        x: 50, 
        y: 0, 
        w: 50, 
        h: 50, 
        dy: 0, 
        jumpForce: -14, 
        gravity: 0.7, 
        grounded: false
    };

    const obstacles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        groundY = canvas.height * 0.85; // Recalculate ground
        if (dragon.grounded) dragon.y = groundY - dragon.h; 
    }

    window.addEventListener('resize', resize);
    resize(); // Set initial size

    // Set initial dragon position after first resize
    dragon.y = groundY - dragon.h;

    function spawnObstacle() {
        if (score >= 10 || isDancing) return;
        const isLog = Math.random() > 0.5;
        obstacles.push({ 
            x: canvas.width, 
            type: isLog ? 'log' : 'puddle', 
            w: 40, 
            h: isLog ? 40 : 10, 
            passed: false 
        });
    }

    function handleInput(e) {
        if (e && e.cancelable) e.preventDefault(); // Critical for mobile
        if (dragon.grounded && !isDancing) {
            dragon.dy = dragon.jumpForce;
            dragon.grounded = false;
        }
    }

    function drawDragon() {
    ctx.save();
    if (isDancing) {
        // Your existing Victory Dance movement
        ctx.translate(0, Math.sin(frame * 0.2) * 30);
        ctx.rotate(Math.sin(frame * 0.1) * 0.3);
    }

    // 1. BELLY/BODY (A solid green oval)
    ctx.fillStyle = '#4CAF50';
    ctx.beginPath();
    ctx.ellipse(dragon.x + 20, dragon.y + 30, 20, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // 2. HEAD & NECK (A curve leading to a snout)
    ctx.beginPath();
    ctx.moveTo(dragon.x + 25, dragon.y + 20); // Neck base
    ctx.lineTo(dragon.x + 45, dragon.y + 10); // Top of head
    ctx.lineTo(dragon.x + 50, dragon.y + 20); // Snout
    ctx.lineTo(dragon.x + 35, dragon.y + 30); // Under chin
    ctx.closePath();
    ctx.fill();

    // 3. EYE (Your original eye, positioned on the new head)
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(dragon.x + 42, dragon.y + 15, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'black'; // Add a pupil for character!
    ctx.beginPath();
    ctx.arc(dragon.x + 43, dragon.y + 15, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // 4. THE WINGS (With Animation!)
    // This formula calculates the wing tips flapping based on the game frame.
    let flap = Math.sin(frame * 0.2) * 15;
    ctx.fillStyle = '#2E7D32'; // Darker green for the wings
    ctx.beginPath();
    ctx.moveTo(dragon.x + 15, dragon.y + 20); // Wing root
    ctx.lineTo(dragon.x + 5, dragon.y + flap); // Upper tip (animated)
    ctx.lineTo(dragon.x + 0, dragon.y + 20 + (flap/2)); // Lower tip (subtly animated)
    ctx.closePath();
    ctx.fill();

    // 5. SPIKES (Red triangles along the spine)
    ctx.fillStyle = '#C62828';
    for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        let sX = dragon.x + 10 + (i * 10);
        let sY = dragon.y + 20;
        ctx.moveTo(sX, sY);
        ctx.lineTo(sX + 5, sY - 10); // Point of spike
        ctx.lineTo(sX + 10, sY);
        ctx.fill();
    }

    ctx.restore();
            }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Draw Ground
        ctx.fillStyle = '#5d4037';
        ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);

        if (!isDancing) {
            dragon.dy += dragon.gravity;
            dragon.y += dragon.dy;

            if (dragon.y + dragon.h > groundY) {
                dragon.y = groundY - dragon.h;
                dragon.dy = 0;
                dragon.grounded = true;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= 7; // Fixed speed for consistent mobile play

                ctx.fillStyle = obs.type === 'log' ? '#8d6e63' : '#2196F3';
                if (obs.type === 'log') {
    // 1. THE LOG (A sturdy cylinder with bark)
    ctx.fillStyle = '#795548'; // Rich wood brown
    ctx.fillRect(obs.x, groundY - obs.h, obs.w, obs.h);
    
    // Add "Bark" lines for texture
    ctx.strokeStyle = '#4e342e'; // Darker brown
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(obs.x + 5, groundY - obs.h + 10);
    ctx.lineTo(obs.x + obs.w - 5, groundY - obs.h + 10);
    ctx.moveTo(obs.x + 8, groundY - obs.h + 25);
    ctx.lineTo(obs.x + obs.w - 8, groundY - obs.h + 25);
    ctx.stroke();

} else {
    // 2. THE PUDDLE (Flat, organic water)
    ctx.fillStyle = '#2196F3'; // Bright water blue
    ctx.beginPath();
    // We draw an ellipse so it looks flat on the ground
    ctx.ellipse(obs.x + (obs.w / 2), groundY - 2, obs.w / 1.5, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Add a "Reflection" highlight
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
    ctx.beginPath();
    ctx.ellipse(obs.x + (obs.w / 2) - 5, groundY - 4, obs.w / 3, 2, 0, 0, Math.PI * 2);
    ctx.stroke();
                }

                // Collision
                if (dragon.x < obs.x + obs.w && dragon.x + dragon.w > obs.x &&
                    dragon.y + dragon.h > groundY - obs.h) {
                    score = 0;
                    scoreEl.innerText = score;
                    obstacles.length = 0;
                }

                if (!obs.passed && obs.x + obs.w < dragon.x) {
                    obs.passed = true;
                    score++;
                    scoreEl.innerText = score;
                    if (score >= 10) isDancing = true;
                }
                if (obs.x < -50) obstacles.splice(i, 1);
            }

            if (frame % 75 === 0) spawnObstacle();
        } else {
            ctx.fillStyle = '#1b4332';
            ctx.font = 'bold 24px sans-serif';
            ctx.textAlign = "center";
            ctx.fillText("VICTORY DANCE!", canvas.width/2, canvas.height/2);
        }

        drawDragon();
        frame++;
        requestAnimationFrame(update);
    }

    // Best mobile listeners
    window.addEventListener('touchstart', handleInput, { passive: false });
    window.addEventListener('mousedown', handleInput);
    update();
                    </script>
</body>
</html>
