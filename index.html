<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sky Splat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            background: linear-gradient(to bottom, #1a0b2e, #4c1c5c, #8b3d88, #cca7a6);
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            font-weight: bold;
            font-size: 18px;
            text-shadow: 2px 2px 4px #000;
        }
        #menu {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            border: 2px solid #8b3d88;
            box-shadow: 0 0 30px rgba(139, 61, 136, 0.5);
            max-width: 80%;
        }
        h1 {
            margin-top: 0;
            color: #ff3366;
            font-size: 36px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button {
            background: #ff3366;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
            margin-top: 15px;
            box-shadow: 0 5px 15px rgba(255, 51, 102, 0.4);
        }
        button:active {
            transform: scale(0.95);
        }
        button:hover {
            background: #ff5588;
        }
        .instructions {
            font-size: 14px;
            color: #ccc;
            margin: 15px 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div>Altitude: <span id="altVal">5000</span>m</div>
        <div>Velocity: <span id="velVal">0</span> km/h</div>
        <div>Score: <span id="scoreVal">0</span></div>
    </div>
    
    <div id="menu">
        <h1 id="menuTitle">SKY SPLAT</h1>
        <p id="menuText" class="instructions">
            You are plunging from the heavens! Move left/right to catch golden rings for speed points, dodge floating space debris, and aim perfectly for the bullseye Splat Zone at the bottom!
        </p>
        <p class="instructions"><strong>Controls:</strong> Move Mouse or Drag Screen left/right to steer.</p>
        <button id="startBtn" onclick="startGame()">DIVE</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI Elements
    const altVal = document.getElementById('altVal');
    const velVal = document.getElementById('velVal');
    const scoreVal = document.getElementById('scoreVal');
    const menu = document.getElementById('menu');
    const menuTitle = document.getElementById('menuTitle');
    const menuText = document.getElementById('menuText');
    const startBtn = document.getElementById('startBtn');

    // Web Audio Setup for procedurally generated arcade sounds
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'ring') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(587.33, now); // D5
            osc.frequency.exponentialRampToValueAtTime(1174.66, now + 0.15); // D6
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
        } else if (type === 'hit') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(220, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.2);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.2);
            osc.start(now);
            osc.stop(now + 0.2);
        } else if (type === 'splat') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
            gain.gain.setValueAtTime(0.8, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        }
    }

    // Game Variables
    let gameState = 'START'; // START, PLAYING, GAMEOVER
    let player = { x: 0, y: 150, radius: 15, targetX: 0, speed: 8 };
    let altitude = 5000; // Starting height
    let fallSpeed = 12;  // Base descent rate
    let score = 0;
    let entities = [];   // Obstacles and Rings
    let particles = [];
    let splatZone = { x: 0, radius: 90 };
    let cameraShake = 0;
    let bgScroll = 0;

    // Handle Resize
    function resizeCanvas() {
        canvas.width = Math.min(window.innerWidth, 480);
        canvas.height = window.innerHeight;
        player.x = canvas.width / 2;
        player.targetX = player.x;
        splatZone.x = canvas.width / 2;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Input Tracking
    function setTargetX(clientX) {
        const rect = canvas.getBoundingClientRect();
        player.targetX = clientX - rect.left;
    }

    window.addEventListener('mousemove', (e) => { if(gameState === 'PLAYING') setTargetX(e.clientX); });
    window.addEventListener('touchmove', (e) => { 
        if(gameState === 'PLAYING') {
            setTargetX(e.touches[0].clientX); 
            e.preventDefault();
        }
    }, { passive: false });

    function spawnEntity() {
        if (altitude < 400) return; // Don't spawn objects close to the deck
        
        let isRing = Math.random() > 0.4;
        entities.push({
            x: Math.random() * (canvas.width - 40) + 20,
            y: canvas.height + 50,
            radius: isRing ? 12 : 18,
            isRing: isRing,
            color: isRing ? '#ffd700' : '#ff3333',
            pulse: 0
        });
    }

    function createExplosion(x, y, color, count = 10) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                radius: Math.random() * 4 + 2,
                color: color,
                alpha: 1,
                decay: Math.random() * 0.03 + 0.01
            });
        }
    }

    function startGame() {
        initAudio();
        gameState = 'PLAYING';
        menu.style.display = 'none';
        altitude = 5000;
        fallSpeed = 12;
        score = 0;
        entities = [];
        particles = [];
        player.x = canvas.width / 2;
        player.targetX = player.x;
    }

    function triggerGameOver(landed) {
        gameState = 'GAMEOVER';
        menu.style.display = 'block';
        
        if (landed) {
            playSound('splat');
            cameraShake = 25;
            // Calculate distance from center of target
            let dist = Math.abs(player.x - splatZone.x);
            let accuracy = Math.max(0, 100 - Math.floor((dist / splatZone.radius) * 100));
            let landingScore = accuracy * 25;
            score += landingScore;

            menuTitle.innerText = "💥 SPLAT! 💥";
            menuText.innerHTML = `You hit the Splat Zone with <strong>${accuracy}% accuracy</strong>!<br><br>Landing Bonus: +${landingScore} pts.<br><strong>Total Final Score: ${score}</strong>`;
            createExplosion(player.x, player.y, '#ff3366', 40);
        } else {
            playSound('hit');
            menuTitle.innerText = "☠️ CRASHED ☠️";
            menuText.innerHTML = `You broke up in mid-air before hitting the ground!<br><br><strong>Final Score: ${score}</strong>`;
        }
        startBtn.innerText = "DIVE AGAIN";
    }

    // Main Game Loop
    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Screen Shake Logic
        ctx.save();
        if (cameraShake > 0) {
            let dx = (Math.random() - 0.5) * cameraShake;
            let dy = (Math.random() - 0.5) * cameraShake;
            ctx.translate(dx, dy);
            cameraShake *= 0.9;
        }

        if (gameState === 'PLAYING') {
            // Drop altitude and increase gravity feel
            altitude -= (fallSpeed / 60) * 2.5; 
            if(altitude < 0) altitude = 0;

            // UI Adjustments
            altVal.innerText = Math.floor(altitude);
            velVal.innerText = Math.floor(fallSpeed * 25);
            scoreVal.innerText = score;

            // Background line illusions for high speed
            bgScroll += fallSpeed;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) {
                let ly = ((bgScroll + i * (canvas.height / 5)) % canvas.height);
                ctx.beginPath();
                ctx.moveTo(0, ly); ctx.lineTo(canvas.width, ly);
                ctx.stroke();
            }

            // Lerp Player Movement toward input target
            player.x += (player.targetX - player.x) * 0.15;
            // Bound inside screen boundaries
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));

            // Spawning logic based on dynamic intervals
            if (Math.random() < 0.06 && altitude > 300) {
                spawnEntity();
            }

            // Handle Obstacles & Collectibles
            for (let i = entities.length - 1; i >= 0; i--) {
                let e = entities[i];
                e.y -= fallSpeed; // Move upward relative to falling player
                e.pulse += 0.1;

                // Draw Object
                ctx.beginPath();
                if (e.isRing) {
                    // Draw Golden Ring
                    ctx.arc(e.x, e.y, e.radius + Math.sin(e.pulse)*2, 0, Math.PI * 2);
                    ctx.strokeStyle = e.color;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else {
                    // Draw spiked hazardous debris
                    ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
                    ctx.fillStyle = e.color;
                    ctx.fill();
                    // Spikes
                    ctx.fillStyle = '#ffaa00';
                    for(let s=0; s<4; s++) {
                        ctx.fillRect(e.x - e.radius - 4, e.y - 2, 8, 4);
                        ctx.translate(e.x, e.y); ctx.rotate(Math.PI/2); ctx.translate(-e.x, -e.y);
                    }
                }

                // Check Collisions
                let dist = Math.hypot(player.x - e.x, player.y - e.y);
                if (dist < player.radius + e.radius) {
                    if (e.isRing) {
                        playSound('ring');
                        score += 150;
                        fallSpeed += 1.5; // Extra boost speed!
                        createExplosion(e.x, e.y, '#ffd700', 6);
                    } else {
                        playSound('hit');
                        cameraShake = 12;
                        score = Math.max(0, score - 200);
                        fallSpeed = Math.max(8, fallSpeed - 3); // Slow down penalty
                        createExplosion(e.x, e.y, '#ff3333', 12);
                    }
                    entities.splice(i, 1);
                    continue;
                }

                // Cleanup missed objects
                if (e.y < -50) entities.splice(i, 1);
            }

            // Handle Approach to Ground & Ground Target Render
            if (altitude <= 400) {
                // Ground targets smoothly slide into view based on bottom approach
                let groundY = canvas.height - (altitude * (canvas.height / 400));
                
                // Draw Splat Zone Bullseye
                ctx.beginPath();
                ctx.arc(splatZone.x, groundY, splatZone.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0, 180, 0, 0.4)';
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 6;
                ctx.fill();
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(splatZone.x, groundY, splatZone.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.fill();
                ctx.stroke();

                // Trigger Splat landing event when hitting exact bottom ground level
                if (altitude <= 0) {
                    let landedInZone = Math.abs(player.x - splatZone.x) <= splatZone.radius;
                    triggerGameOver(landedInZone);
                }
            }
        }

        // Handle Particles
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= p.decay;
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.restore();
            if(p.alpha <= 0) particles.splice(i, 1);
        }

        // Draw Player Character (Slightly stylized skydiver/rocket ball)
        if (gameState === 'PLAYING' || gameState === 'START') {
            // Speed wind lines behind player
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(player.x - 6, player.y - 20); ctx.lineTo(player.x - 6, player.y - 40);
            ctx.moveTo(player.x + 6, player.y - 20); ctx.lineTo(player.x + 6, player.y - 40);
            ctx.stroke();

            // Main body
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#00ffcc';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffcc';
            ctx.fill();
            ctx.shadowBlur = 0; // reset shadow

            // Goggles/Face vector detail
            ctx.fillStyle = '#111';
            ctx.fillRect(player.x - 8, player.y - 2, 16, 5);
            ctx.fillStyle = '#fff';
            ctx.fillRect(player.x - 6, player.y, 4, 3);
            ctx.fillRect(player.x + 2, player.y, 4, 3);
        }

        ctx.restore();
        requestAnimationFrame(update);
    }

    // Fire Up Loop Initializer
    requestAnimationFrame(update);
</script>

</body>
</html>
